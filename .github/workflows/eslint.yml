# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org

name: ESLint

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      # actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        # You may pin to the exact commit or the version.
        # uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb
        uses: denoland/setup-deno@v2.0.3
        with:
          # The Deno version to install. Can be a semver version of a stable release, "canary" for the latest canary, "lts" for the latest LTS, or the Git hash of a specific canary release.
          deno-version: 2.7.5
          # Cache downloaded modules & packages automatically in GitHub Actions cache.
          cache: true

        # eslint has various plugins, easier to reuse package cache
      - name: Install Dependencies
        run: deno install --allow-scripts

      - name: svelte-kit prepare
        run: deno task prepare

      # https://docs.github.com/en/code-security/code-scanning/integrating-with-code-scanning/uploading-a-sarif-file-to-github#example-workflow-that-runs-the-eslint-analysis-tool
      - name: eslint (sarif output)
        # eslint exits 1 if it finds anything to report
        # https://github.com/microsoft/sarif-js-sdk/issues/91
        # @microsoft/eslint-formatter-sarif uses eslint@8.57.1 instead of local eslint despite it not needing it.
        run: |
          wget https://raw.githubusercontent.com/microsoft/sarif-js-sdk/refs/heads/main/packages/eslint-formatter-sarif/sarif.js -O node_modules/sarif.cjs
          deno install npm:utf8 npm:lodash npm:jschardet
          deno task --eval "eslint . --format node_modules/sarif.cjs -o eslint-results.sarif || true"

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
